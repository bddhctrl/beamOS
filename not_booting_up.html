<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>beamOS - System Recovery</title>
<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
}

#popup {
    position: absolute;
    width: 400px;
    background: #222;
    border: 2px solid #555;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: none; /* Starts hidden, shows after 5 seconds */
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
}

.header {
    background: #333;
    padding: 10px;
    text-align: center;
    font-weight: bold;
    border-bottom: 1px solid #555;
    height: 18px; /* Holds space for the blank title */
}

.content {
    padding: 20px;
    text-align: center;
}

.content img {
    width: 50px;
    margin-bottom: 10px;
}

#progressContainer {
    width: 100%;
    background: #444;
    height: 20px;
    margin-top: 15px;
}

#progressBar {
    height: 100%;
    width: 0%;
    background: limegreen;
    transition: width 0.4s ease-out; /* Smooths out manual jumps */
}

#percent {
    margin-top: 8px;
    font-size: 12px;
    color: #aaa;
}
</style>
</head>
<body>

<div id="popup">
    <div class="header"></div>
    <div class="content">
        <img src="error_popupicon.png" alt="Error">
        <div>Undoing failed changes....</div>

        <div id="progressContainer">
            <div id="progressBar"></div>
        </div>
        <div id="percent">0%</div>
    </div>
</div>

<script>
const popup = document.getElementById("popup");
const progressBar = document.getElementById("progressBar");
const percentText = document.getElementById("percent");

// 1. Wait 5 seconds, then show the popup and start the bar
setTimeout(() => {
    popup.style.display = "block";
    startRecoveryProgress();
}, 5000);

function startRecoveryProgress() {
    let currentPercent = 0;

    // Helper to visually update elements
    function setProgress(val) {
        currentPercent = val;
        progressBar.style.width = currentPercent + "%";
        percentText.innerText = currentPercent.toFixed(1) + "%";
    }

    // Phase A: At 2 seconds, jump/move to 5%
    setTimeout(() => {
        setProgress(5);

        // Phase B: At 10 seconds total, start an automatic 10-second crawl
        setTimeout(() => {
            let crawlStartTime = Date.now();
            let crawlDuration = 10000; // 10 seconds
            let startPercent = 5;
            let targetPercent = 45; // Crawls up to 45%

            function crawl() {
                let elapsed = Date.now() - crawlStartTime;
                let progress = Math.min(elapsed / crawlDuration, 1);
                
                let currentCrawl = startPercent + (targetPercent - startPercent) * progress;
                setProgress(currentCrawl);

                if (progress < 1) {
                    requestAnimationFrame(crawl);
                } else {
                    // Phase C: Instantly drop/move to another number (e.g., 20%)
                    setTimeout(() => {
                        setProgress(20);

                        // Phase D: Complete the rest automatically over 5 seconds
                        setTimeout(() => {
                            let finalStartTime = Date.now();
                            let finalDuration = 5000;
                            let finalStartPercent = 20;

                            function finish() {
                                let elapsed = Date.now() - finalStartTime;
                                let progress = Math.min(elapsed / finalDuration, 1);
                                
                                setProgress(finalStartPercent + (100 - finalStartPercent) * progress);

                                if (progress < 1) {
                                    requestAnimationFrame(finish);
                                } else {
                                    // Clean up: Reset flag so they can try installing fresh next boot
                                    localStorage.removeItem("install_running");
                                    
                                    // No alert box—instantly redirect back to main page
                                    window.location.href = "index.html"; 
                                }
                            }
                            finish();
                        }, 1500); 

                    }, 1000); 
                }
            }
            crawl();

        }, 8000); // 8s delay + 2s from first phase = 10 seconds total system run time

    }, 2000);
}
</script>

</body>
</html>
